  <script>
  /* ── 全域狀態 ── */
  var _reviewRecords  = [];   // 待審紀錄
  var _catalogRecords = [];   // 課程目錄
  var _selectedIds    = {};   // { recordId: true }
  var _reviewPage     = 1;
  var _reviewPageSize = 15;
  var _rejectTargetId = null; // 目前正在退件的 recordId
  var _editCatalogId  = null; // null = 新增；string = 編輯

  /* ── 登入成功後初始化（必須重新驗證管理者身分）── */
  function onLoginSuccess() {
    if (!isAdmin()) {
      showToast('您沒有管理者權限，即將返回首頁', 'error');
      setTimeout(function(){ _navigate('?page=index'); }, 1500);
      return;
    }
    // 更新頁首姓名顯示（登入後才有值）
    var nameEl = document.getElementById('user-name-display');
    if (nameEl) nameEl.textContent = getUserName() || '';
    _renderAdminNav();
    _loadReviews();
  }

  /* ────────────────────────────────
     Tab 切換
  ──────────────────────────────── */
  function switchAdminTab(tab) {
    ['review','catalog','notify','req'].forEach(function(t) {
      document.getElementById('atab-' + t).classList.toggle('active', t === tab);
      document.getElementById('panel-' + t).style.display = (t === tab) ? '' : 'none';
    });
    if (tab === 'catalog' && _catalogRecords.length === 0) _loadCatalog();
    if (tab === 'req'     && _reqRecords.length === 0)     _loadRequirements();
  }

  /* ────────────────────────────────
     Tab 1：待審核
  ──────────────────────────────── */
  function _loadReviews() {
    showSpinner();
    api('v1/admin/getPendingReviews', {})
      .then(function(res) {
        hideSpinner();
        _reviewRecords = (res && res.data) ? res.data : [];
        // 依送出時間由舊到新（先送先審）
        _reviewRecords.sort(function(a,b) {
          return (a.submittedAt || '').localeCompare(b.submittedAt || '');
        });
        document.getElementById('cnt-review').textContent = _reviewRecords.length;
        _selectedIds = {};
        _renderReviews();
      })
      .catch(function(err) {
        hideSpinner();
        if (err && err.message !== 'TOKEN_EXPIRED') {
          document.getElementById('review-list').innerHTML =
            '<div class="empty-state"><div class="ei">❌</div><p>載入失敗，請重新整理。</p></div>';
        }
      });
  }

  function _renderReviews() {
    var total = _reviewRecords.length;
    var totalPages = Math.max(1, Math.ceil(total / _reviewPageSize));
    if (_reviewPage > totalPages) _reviewPage = 1;
    var items = _reviewRecords.slice(
      (_reviewPage - 1) * _reviewPageSize,
      _reviewPage * _reviewPageSize
    );

    _updateSelectedCount();

    var list = document.getElementById('review-list');
    if (!items.length) {
      list.innerHTML =
        '<div class="empty-state"><div class="ei">🎉</div>' +
        '<p>目前沒有待審紀錄，處理完畢！</p></div>';
    } else {
      list.innerHTML = items.map(function(r) {
        return _renderReviewRow(r);
      }).join('');
    }

    renderPagination('review-pagination', _reviewPage, totalPages, 'goReviewPage');
  }

  function _renderReviewRow(r) {
    var checked  = !!_selectedIds[r.recordId];
    var checkCls = 'check-box' + (checked ? ' checked' : '');
    var rowCls   = 'check-row' + (checked ? ' checked' : '');
    var customBadge = r.isCustom
      ? '<span style="font-size:0.70rem;background:var(--gray-200);color:var(--gray-700);' +
        'border-radius:999px;padding:1px 7px;margin-left:4px">自訂</span>'
      : '';

    return '<div class="' + rowCls + '" id="rrow-' + r.recordId + '">' +
      /* 勾選框 */
      '<div class="' + checkCls + '" id="chk-' + r.recordId + '"' +
      ' onclick="toggleCheck(\'' + r.recordId + '\')">' +
      (checked ? '✓' : '') +
      '</div>' +
      /* 內容 */
      '<div style="flex:1;min-width:0">' +
        '<div class="review-row-title">' + _e(r.title) + customBadge + '</div>' +
        '<div class="review-row-meta">' +
          '👤 ' + _e(r.userId || '─') +
          ' &nbsp; 📅 ' + _e(r.trainingDate || '─') +
          ' &nbsp; ⏱ ' + (r.hours != null ? r.hours : '─') + ' 小時' +
          (r.organizer ? ' &nbsp; 🏛 ' + _e(r.organizer) : '') +
        '</div>' +
        '<div class="review-row-meta">🕐 送出：' + fmtTs(r.submittedAt) + '</div>' +
      '</div>' +
      /* 操作按鈕 */
      '<div style="display:flex;flex-direction:column;gap:6px;align-items:stretch;min-width:100px">' +
        (r.fileId
          ? '<button class="btn btn-xs btn-outline" onclick="viewFile(\'' +
            r.fileId + '\')">📎 查看證明</button>'
          : '') +
        '<button class="btn btn-xs btn-success"' +
        ' onclick="approveOne(\'' + r.recordId + '\')">✅ 核准</button>' +
        '<button class="btn btn-xs btn-danger"' +
        ' onclick="openRejectModal(\'' + r.recordId + '\')">❌ 退件</button>' +
      '</div>' +
      '</div>';
  }

  function goReviewPage(page) {
    _reviewPage = page;
    _renderReviews();
    window.scrollTo(0, 0);
  }

  /* ── 勾選邏輯 ── */
  function toggleCheck(recordId) {
    if (_selectedIds[recordId]) {
      delete _selectedIds[recordId];
    } else {
      _selectedIds[recordId] = true;
    }
    var chk = document.getElementById('chk-' + recordId);
    var row = document.getElementById('rrow-' + recordId);
    if (chk) {
      chk.classList.toggle('checked', !!_selectedIds[recordId]);
      chk.textContent = _selectedIds[recordId] ? '✓' : '';
    }
    if (row) row.classList.toggle('checked', !!_selectedIds[recordId]);
    _updateSelectedCount();
  }

  function toggleSelectAll() {
    var page = _reviewRecords.slice(
      (_reviewPage - 1) * _reviewPageSize,
      _reviewPage * _reviewPageSize
    );
    // 判斷是否全選
    var allSelected = page.every(function(r) { return !!_selectedIds[r.recordId]; });
    page.forEach(function(r) {
      if (allSelected) {
        delete _selectedIds[r.recordId];
      } else {
        _selectedIds[r.recordId] = true;
      }
    });
    _renderReviews();
  }

  function _updateSelectedCount() {
    var cnt = Object.keys(_selectedIds).length;

  /* ── 退件 Modal ── */
  var _REJECT_REASONS = [
    '證明文件模糊，無法識別',
    '上傳之證明文件與研習名稱不符',
    '研習時數與證明文件標示不符',
    '非本學年度之研習紀錄',

  ];

  function openRejectModal(recordId) {
    _rejectTargetId = recordId;

    // 從全域陣列查詢課程與教師（避免 JSON.stringify 雙引號破壞 HTML onclick 屬性）
    var rec = null;
    for (var i = 0; i < _reviewRecords.length; i++) {
      if (_reviewRecords[i].recordId === recordId) { rec = _reviewRecords[i]; break; }
    }
    document.getElementById('reject-modal-target').textContent =
      '課程：' + (rec ? rec.title : '─') + '　教師：' + (rec ? rec.userId : '─');

    // 動態產生 radio 選項
    var html = '';
    _REJECT_REASONS.forEach(function(reason, idx) {
      html +=
        '<label style="display:flex;align-items:center;gap:12px;padding:10px 14px;' +
        'border:2px solid var(--gray-300);border-radius:var(--radius);cursor:pointer;' +
        'transition:border-color .15s" id="rr-label-' + idx + '">' +
        '<input type="radio" name="reject-reason" value="' + idx + '"' +
        ' onchange="onRejectReasonChange(' + idx + ')"' +
        ' style="width:20px;height:20px;flex-shrink:0;cursor:pointer">' +
        '<span style="font-size:0.88rem">' + _e(reason) + '</span>' +
        '</label>';
    });
    document.getElementById('reject-reason-list').innerHTML = html;

    // 重置狀態
    document.getElementById('reject-custom-section').classList.add('hidden');
    document.getElementById('reject-custom-input').value = '';
    document.getElementById('reject-note-err').style.display = 'none';

    document.getElementById('reject-modal').style.display = 'flex';
  }

  function onRejectReasonChange(idx) {
    var isOther = (idx === _REJECT_REASONS.length - 1);
    // 其他：顯示自訂 textarea
    document.getElementById('reject-custom-section').classList.toggle('hidden', !isOther);
    if (isOther) document.getElementById('reject-custom-input').focus();
    // 更新選項邊框高亮
    _REJECT_REASONS.forEach(function(_, i) {
      var label = document.getElementById('rr-label-' + i);
      if (label) label.style.borderColor = (i === idx) ? 'var(--danger)' : 'var(--gray-300)';
    });
    document.getElementById('reject-note-err').style.display = 'none';
  }

  function closeRejectModal() {
    document.getElementById('reject-modal').style.display = 'none';
    _rejectTargetId = null;
  }

  function confirmReject() {
    var errEl = document.getElementById('reject-note-err');
    // 讀取選取的 radio
    var radios = document.querySelectorAll('input[name="reject-reason"]');
    var selectedIdx = -1;
    for (var i = 0; i < radios.length; i++) {
      if (radios[i].checked) { selectedIdx = parseInt(radios[i].value); break; }
    }
    if (selectedIdx === -1) {
      errEl.textContent = '請選擇退件原因。';
      errEl.style.display = 'block';
      return;
    }
    var isOther = (selectedIdx === _REJECT_REASONS.length - 1);
    var note = isOther
      ? document.getElementById('reject-custom-input').value.trim()
      : _REJECT_REASONS[selectedIdx];
    if (!note) {
      errEl.textContent = '請填寫退件說明。';
      errEl.style.display = 'block';
      return;
    }
    errEl.style.display = 'none';
    var targetId = _rejectTargetId; // 先存起來，closeRejectModal 會把 _rejectTargetId 清成 null
    closeRejectModal();
    _doReview(
      [{ recordId: targetId, status: 'REJECTED', reviewNote: note }],
      '已退件 1 筆紀錄'
    );
  }

  /* ── 新增 / 編輯 Modal ── */
  function openCatalogModal(catalogIdOrObj) {
    // 接受 null（新增模式）、catalogId 字串（編輯模式）
    // 改用 ID 查詢是因為直接傳 JSON.stringify(obj) 會因雙引號破壞 HTML onclick 屬性
    var catalogObj = null;
    if (catalogIdOrObj && typeof catalogIdOrObj === 'string') {
      for (var i = 0; i < _catalogRecords.length; i++) {
        if (_catalogRecords[i].catalogId === catalogIdOrObj) {
          catalogObj = _catalogRecords[i]; break;
        }
      }
    } else if (catalogIdOrObj && typeof catalogIdOrObj === 'object') {
      catalogObj = catalogIdOrObj; // 向下相容（直接傳物件的呼叫方式）
    }
    _editCatalogId = catalogObj ? catalogObj.catalogId : null;

    // 填入欄位
    document.getElementById('cm-title').textContent =
      _editCatalogId ? '編輯研習課程' : '新增研習課程';
    document.getElementById('cm-ftitle').value      = catalogObj ? (catalogObj.title    || '') : '';
    document.getElementById('cm-fhours').value      = catalogObj ? (catalogObj.hours    || '') : '';
    document.getElementById('cm-forganizer').value  = catalogObj ? (catalogObj.organizer|| '') : '';
    document.getElementById('cm-fdept').value       = catalogObj ? (catalogObj.department|| '') : '';
    document.getElementById('cm-faudience').value   = catalogObj ? (catalogObj.targetAudience|| '') : '';
    document.getElementById('cm-flink').value       = catalogObj ? (catalogObj.link     || '') : '';
    document.getElementById('cm-fdesc').value       = catalogObj ? (catalogObj.description|| '') : '';
    document.getElementById('cm-frequired').checked = catalogObj ? !!catalogObj.isRequired : false;
    document.getElementById('cm-err').style.display = 'none';

    // 日期：YYYY/M/D → YYYY-MM-DD
    ['start','end'].forEach(function(key) {
      var val = catalogObj ? catalogObj[key + 'Date'] : '';
      if (val) {
        var parts = val.split('/');
        if (parts.length === 3) {
          val = parts[0] + '-' + String(parseInt(parts[1])).padStart(2,'0') +
                '-' + String(parseInt(parts[2])).padStart(2,'0');
        }
      }
      document.getElementById('cm-f' + key).value = val || '';
    });

    document.getElementById('catalog-modal').style.display = 'flex';
  }

  function closeCatalogModal() {
    document.getElementById('catalog-modal').style.display = 'none';
    _editCatalogId = null;
  }

  function saveCatalog() {
    var title    = document.getElementById('cm-ftitle').value.trim();
    var hoursStr = document.getElementById('cm-fhours').value;
    var organizer= document.getElementById('cm-forganizer').value.trim();
    var hours    = parseFloat(hoursStr);
    var errEl    = document.getElementById('cm-err');

    if (!title)   { errEl.textContent = '請填寫課程名稱。';  errEl.style.display='block'; return; }
    if (!hoursStr || isNaN(hours) || hours <= 0) {
      errEl.textContent = '請填寫正確的研習時數。'; errEl.style.display='block'; return;
    }
    if (!organizer) { errEl.textContent = '請填寫主辦單位。'; errEl.style.display='block'; return; }
    errEl.style.display = 'none';

    /* 日期轉換：YYYY-MM-DD → YYYY/M/D */
    function toGasDate(val) {
      if (!val) return '';
      var p = val.split('-');
      if (p.length !== 3) return val;
      return parseInt(p[0]) + '/' + parseInt(p[1]) + '/' + parseInt(p[2]);
    }

    var body = {
      title:          title,
      hours:          hours,
      organizer:      organizer,
      department:     document.getElementById('cm-fdept').value.trim(),
      targetAudience: document.getElementById('cm-faudience').value.trim(),
      link:           document.getElementById('cm-flink').value.trim(),
      description:    document.getElementById('cm-fdesc').value.trim(),
      isRequired:     document.getElementById('cm-frequired').checked,
      startDate:      toGasDate(document.getElementById('cm-fstart').value),
      endDate:        toGasDate(document.getElementById('cm-fend').value)
    };

    var action = _editCatalogId
      ? 'v1/admin/editCatalog'
      : 'v1/admin/addCatalog';
    if (_editCatalogId) body.catalogId = _editCatalogId;

    closeCatalogModal();
    showSpinner();
    api(action, body)
      .then(function(res) {
        hideSpinner();
        if (res && res.success) {
          showToast(_editCatalogId ? '✅ 課程已更新' : '✅ 課程已新增', 'success');
          _catalogRecords = [];
          _loadCatalog();
        } else {
          showToast((res && res.error) || '儲存失敗', 'error');
        }
      })
      .catch(function(err) {
        hideSpinner();
        if (err && err.message !== 'TOKEN_EXPIRED') {
          showToast(err.message || '系統錯誤', 'error');
        }
      });
  }

  function _e(s) {

     Tab 4：年度任務
  ──────────────────────────────── */
  var _reqRecords   = [];  // 所有任務（getAllRequirements 回傳）
  var _reqFiltered  = [];  // 目前篩選年度後的任務
  var _editReqId    = null;
  var _reqCurrentYear = null;

  function _loadRequirements() {
    showSpinner();
    api('v1/admin/getAllRequirements', {})
      .then(function(res) {
        hideSpinner();
        _reqRecords = (res && res.data) ? res.data : [];
        _buildReqYearFilter();
        _renderReqList();
      })
      .catch(function(err) {
        hideSpinner();
        if (err && err.message !== 'TOKEN_EXPIRED') {
          document.getElementById('req-admin-list').innerHTML =
            '<div class="empty-state"><div class="ei">❌</div><p>載入失敗。</p></div>';
        }
      });
  }

  function _buildReqYearFilter() {
    var years = [];
    _reqRecords.forEach(function(r) {
      if (r.academicYear && years.indexOf(r.academicYear) === -1) years.push(r.academicYear);
    });
    years.sort(function(a,b){ return b - a; });

    var sel = document.getElementById('req-year-filter');
    sel.innerHTML = years.map(function(y) {
      return '<option value="' + y + '">' + y + ' 學年度</option>';
    }).join('');

    // 預設選目前或最新學年
    if (!_reqCurrentYear || years.indexOf(_reqCurrentYear) === -1) {
      _reqCurrentYear = years.length ? years[0] : null;
    }
    sel.value = _reqCurrentYear;
    _applyReqFilter();
  }

  function filterReqByYear() {
    _reqCurrentYear = parseInt(document.getElementById('req-year-filter').value) || null;
    _applyReqFilter();
    _renderReqList();
  }

  function _applyReqFilter() {
    _reqFiltered = _reqCurrentYear
      ? _reqRecords.filter(function(r) { return String(r.academicYear) === String(_reqCurrentYear); })
      : _reqRecords;
  }

  function _renderReqList() {
    var list = document.getElementById('req-admin-list');
    if (!_reqFiltered.length) {
      list.innerHTML =
        '<div class="empty-state"><div class="ei">📭</div><p>本學年尚無任務資料。</p></div>';
      return;
    }
    list.innerHTML = _reqFiltered.map(function(r) {
      var statusColor = r.status === 'ARCHIVED' ? 'var(--gray-500)' : 'var(--primary)';
      var statusBadge = r.status === 'ARCHIVED'
        ? '<span style="font-size:0.70rem;background:var(--gray-200);color:var(--gray-600);' +
          'border-radius:999px;padding:1px 7px;margin-left:6px">已封存</span>'
        : '';
      var recurBadge = r.isRecurring
        ? '<span style="font-size:0.70rem;background:#e8f5e9;color:#2e7d32;' +
          'border-radius:999px;padding:1px 7px;margin-left:4px">🔄 延續</span>'
        : '';
      var meta = [];
      if (r.requiredHours > 0) meta.push('⏱ ' + r.requiredHours + ' 小時');
      else if (r.hoursNote) meta.push('⏱ ' + _e(r.hoursNote));
      if (r.endDate) meta.push('📅 截止 ' + _e(r.endDate));
      if (r.targetAudience) meta.push('👥 ' + _e(r.targetAudience));
      if (r.owner) meta.push('🏢 ' + _e(r.owner));

      return '<div class="req-admin-row">' +
        '<div class="req-admin-info">' +
          '<div style="font-size:0.92rem;font-weight:700;color:' + statusColor + ';margin-bottom:4px">' +
            _e(r.name) + statusBadge + recurBadge +
          '</div>' +
          '<div style="font-size:0.78rem;color:var(--gray-700);line-height:1.9">' +
            meta.join(' &nbsp; ') +
            (r.notes ? '<br>📝 ' + _e(r.notes) : '') +
          '</div>' +
          '<div style="font-size:0.72rem;color:var(--gray-500);margin-top:2px">編號：' + _e(r.requirementId) + '</div>' +
        '</div>' +
        '<div class="req-admin-actions">' +
          (r.status !== 'ARCHIVED'
            ? '<button class="btn btn-xs btn-outline" onclick="openReqModal(\'' + r.requirementId + '\')">✏️ 編輯</button>' +
              '<button class="btn btn-xs btn-outline" style="border-color:var(--warning);color:var(--warning)"' +
              ' onclick="archiveReq(\'' + r.requirementId + '\')">🗃 封存</button>'
            : '') +
        '</div>' +
        '</div>';
    }).join('');
  }

  /* ── 新增 / 編輯 Modal ── */
  function openReqModal(requirementId) {
    var obj = null;
    if (requirementId) {
      for (var i = 0; i < _reqRecords.length; i++) {
        if (_reqRecords[i].requirementId === requirementId) { obj = _reqRecords[i]; break; }
      }
    }
    _editReqId = obj ? obj.requirementId : null;

    document.getElementById('rqm-title').textContent = _editReqId ? '編輯年度任務' : '新增年度任務';
    document.getElementById('rqm-fname').value       = obj ? (obj.name || '') : '';
    document.getElementById('rqm-fyear').value       = obj ? (obj.academicYear || _reqCurrentYear || '') : (_reqCurrentYear || '');
    document.getElementById('rqm-fhours').value      = obj ? (obj.requiredHours != null ? obj.requiredHours : '') : '';
    document.getElementById('rqm-fhoursnote').value  = obj ? (obj.hoursNote || '') : '';
    document.getElementById('rqm-fdelivery').value   = obj ? (obj.deliveryType || '') : '';
    document.getElementById('rqm-fsemester').value   = obj ? (obj.semesterSplit || '') : '';
    document.getElementById('rqm-faudience').value   = obj ? (obj.targetAudience || '') : '';
    document.getElementById('rqm-fowner').value      = obj ? (obj.owner || '') : '';
    document.getElementById('rqm-fnotes').value      = obj ? (obj.notes || '') : '';
    document.getElementById('rqm-flinks').value      = obj ? (obj.links || '') : '';
    document.getElementById('rqm-frecurring').checked= obj ? !!obj.isRecurring : true;
    document.getElementById('rqm-err').style.display = 'none';

    // 日期轉換 YYYY/M/D → YYYY-MM-DD
    var endVal = obj ? (obj.endDate || '') : '';
    if (endVal) {
      var p = endVal.split('/');
      if (p.length === 3) {
        endVal = p[0] + '-' + String(parseInt(p[1])).padStart(2,'0') +
                 '-' + String(parseInt(p[2])).padStart(2,'0');
      }
    }
    document.getElementById('rqm-fend').value = endVal;

    document.getElementById('req-modal').style.display = 'flex';
  }

  function closeReqModal() {
    document.getElementById('req-modal').style.display = 'none';
    _editReqId = null;
  }

  function saveReq() {
    var name    = document.getElementById('rqm-fname').value.trim();
    var yearStr = document.getElementById('rqm-fyear').value;
    var errEl   = document.getElementById('rqm-err');

    if (!name) { errEl.textContent = '請填寫任務名稱。'; errEl.style.display='block'; return; }
    var year = parseInt(yearStr);
    if (!year || year < 100) { errEl.textContent = '請填寫正確的學年度（例：114）。'; errEl.style.display='block'; return; }
    errEl.style.display = 'none';

    function toGasDate(val) {
      if (!val) return '';
      var p = val.split('-');
      if (p.length !== 3) return val;
      return parseInt(p[0]) + '/' + parseInt(p[1]) + '/' + parseInt(p[2]);
    }

    var hoursVal = document.getElementById('rqm-fhours').value;
    var body = {
      name:           name,
      academicYear:   year,
      endDate:        toGasDate(document.getElementById('rqm-fend').value),
      requiredHours:  hoursVal !== '' ? parseFloat(hoursVal) : 0,
      hoursNote:      document.getElementById('rqm-fhoursnote').value.trim(),
      deliveryType:   document.getElementById('rqm-fdelivery').value,
      semesterSplit:  document.getElementById('rqm-fsemester').value,
      targetAudience: document.getElementById('rqm-faudience').value.trim(),
      owner:          document.getElementById('rqm-fowner').value.trim(),
      notes:          document.getElementById('rqm-fnotes').value.trim(),
      links:          document.getElementById('rqm-flinks').value.trim(),
      isRecurring:    document.getElementById('rqm-frecurring').checked
    };

    var action = _editReqId ? 'v1/admin/editRequirement' : 'v1/admin/addRequirement';
    if (_editReqId) body.requirementId = _editReqId;

    closeReqModal();
    showSpinner();
    api(action, body)
      .then(function(res) {
        hideSpinner();
        if (res && res.success) {
          showToast(_editReqId ? '✅ 任務已更新' : '✅ 任務已新增', 'success');
          _reqRecords = [];
          _loadRequirements();
        } else {
          showToast((res && res.error) || '儲存失敗', 'error');
        }
      })
      .catch(function(err) {
        hideSpinner();
        if (err && err.message !== 'TOKEN_EXPIRED') showToast(err.message || '系統錯誤', 'error');
      });
  }

  /* ── 封存任務 ── */
  function archiveReq(requirementId) {
    var name = requirementId;
    for (var i = 0; i < _reqRecords.length; i++) {
      if (_reqRecords[i].requirementId === requirementId) { name = _reqRecords[i].name; break; }
    }
    showConfirmModal(
      '確認封存',
      '<p>確定要封存任務 <strong>「' + _e(name) + '」</strong> 嗎？</p>' +
      '<p style="font-size:0.82rem;color:var(--warning);margin-top:8px">封存後教師端進度頁將不再顯示此任務。</p>',
      '確認封存',
      function() {
        showSpinner();
        api('v1/admin/archiveRequirement', { requirementId: requirementId })
          .then(function(res) {
            hideSpinner();
            if (res && res.success) {
              showToast('✅ 任務已封存', 'success');
              _reqRecords = [];
              _loadRequirements();
            } else {
              showToast((res && res.error) || '封存失敗', 'error');
            }
          })
          .catch(function(err) {
            hideSpinner();
            if (err && err.message !== 'TOKEN_EXPIRED') showToast(err.message || '系統錯誤', 'error');
          });
      },
      'btn-warning'
    );
  }

  /* ── 複製到下學年 ── */
  function renewRequirements() {
    var curYear = parseInt(document.getElementById('req-year-filter').value) || null;
    if (!curYear) { showToast('請先選擇來源學年度', 'error'); return; }
    var targetYear = curYear + 1;
    showConfirmModal(
      '複製到下學年',
      '<p>確定要將 <strong>' + curYear + ' 學年度</strong>中「每學年延續」的任務複製到 ' +
      '<strong>' + targetYear + ' 學年度</strong> 嗎？</p>' +
      '<p style="font-size:0.82rem;color:var(--gray-700);margin-top:6px">' +
      '系統會自動調整截止日期（順延一年），已存在的任務不會重複建立。</p>',
      '確認複製',
      function() {
        showSpinner();
        api('v1/admin/renewRequirements', { sourceYear: curYear, targetYear: targetYear })
          .then(function(res) {
            hideSpinner();
            if (res && res.success) {
              var cnt = res.data && res.data.created != null ? res.data.created : '─';
              showToast('✅ 已複製 ' + cnt + ' 筆任務到 ' + targetYear + ' 學年度', 'success');
              _reqCurrentYear = targetYear;
              _reqRecords = [];
              _loadRequirements();
            } else {
              showToast((res && res.error) || '複製失敗', 'error');
            }
          })
          .catch(function(err) {
            hideSpinner();
            if (err && err.message !== 'TOKEN_EXPIRED') showToast(err.message || '系統錯誤', 'error');
          });
      },
      'btn-primary'
    );
  }

  /* ── 初始化（管理者限定）── */
  document.addEventListener('DOMContentLoaded', function() {
    var ok = initPage({ adminOnly: true });
    if (ok) _loadReviews();
  });

  /* ── GAS Warden 作用域隔離修正 ── */
  window.onLoginSuccess      = onLoginSuccess;
  window.switchAdminTab      = switchAdminTab;
  window.goReviewPage        = goReviewPage;
  window.toggleCheck         = toggleCheck;
  window.toggleSelectAll     = toggleSelectAll;
  window.approveOne          = approveOne;
  window.batchApprove        = batchApprove;
  window.viewFile            = viewFile;
  window.openRejectModal       = openRejectModal;
  window.onRejectReasonChange  = onRejectReasonChange;
  window.closeRejectModal      = closeRejectModal;
  window.confirmReject         = confirmReject;
  window.openCatalogModal    = openCatalogModal;
  window.closeCatalogModal   = closeCatalogModal;
  window.saveCatalog         = saveCatalog;
  window.archiveCatalog      = archiveCatalog;
  window.exportRecords       = exportRecords;
  window.previewNotification = previewNotification;
  window.triggerNotification = triggerNotification;
  window.filterReqByYear     = filterReqByYear;
  window.openReqModal        = openReqModal;
  window.closeReqModal       = closeReqModal;
  window.saveReq             = saveReq;
  window.archiveReq          = archiveReq;
  window.renewRequirements   = renewRequirements;
  </script>
</body>
</html>
